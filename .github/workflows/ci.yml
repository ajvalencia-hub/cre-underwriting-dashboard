name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LibreOffice + Tesseract (parity, memo PDF, OCR paths)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-calc libreoffice-writer tesseract-ocr poppler-utils
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Type-check (mypy)
        working-directory: backend
        run: mypy app
      - name: Run pytest (includes Excel parity via LibreOffice)
        working-directory: backend
        run: python -m pytest tests -q
      - name: Parity CLI (divergence table)
        working-directory: backend
        run: python -m tests.parity.run

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck + build
        working-directory: frontend
        run: npm run build
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Unit tests
        working-directory: frontend
        run: npm test

  # Separate job so unit-test feedback stays fast — one chromium happy path
  # through the real stack (scratch-DB backend + Vite dev server).
  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Create the backend venv the Playwright config launches
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run the smoke
        working-directory: frontend
        run: npx playwright test
      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
